  font-family: Arial;

<body>

<h1>🌱 Alerta Verde AI</h1>
<p>Simulación inteligente de paneles solares</p>

<h2>📥 Ingresar datos</h2>

<input id="panel" placeholder="ID Panel">
<input id="ubicacion" placeholder="Ubicación">
<input id="temperatura" placeholder="Temperatura">
<input id="voltaje" placeholder="Voltaje">
<input id="corriente" placeholder="Corriente">
<input id="eficiencia" placeholder="Eficiencia">

<br>
<button onclick="analizar()">Analizar</button>

<h2>🚨 Resultado</h2>
<div id="resultado"></div>

<h2>📊 Historial</h2>
<div id="historial"></div>

<script>

function analizar() {
  const panel = document.getElementById("panel").value;
  const ubicacion = document.getElementById("ubicacion").value;
  const temp = parseFloat(document.getElementById("temperatura").value);
  const volt = parseFloat(document.getElementById("voltaje").value);
  const corr = parseFloat(document.getElementById("corriente").value);
  const eff = parseFloat(document.getElementById("eficiencia").value);

  let estado = "Normal";

  // Lógica de anomalía
  if (eff < 50 || volt < 20 || temp > 60) {
    estado = "Falla";
  }

  // Costos
  let energia_perdida = estado === "Falla" ? (Math.random() * 15 + 5) : (Math.random() * 2);
  let costo_perdida = energia_perdida * 0.15;
  let reparacion = estado === "Falla" ? (Math.random() * 150 + 50) : 0;

  const color = estado === "Falla" ? "red" : "lightgreen";

  // Mostrar resultado
  document.getElementById("resultado").innerHTML = `
    <div class="panel">
      <h3>Panel ${panel}</h3>
      <p>📍 ${ubicacion}</p>
      <p style="color:${color};">${estado}</p>
      <p>⚡ ${energia_perdida.toFixed(2)} kWh</p>
      <p>💸 $${costo_perdida.toFixed(2)}</p>
      <p>🔧 $${reparacion.toFixed(2)}</p>
    </div>
  `;

  // Historial
  const div = document.createElement("div");
  div.className = "panel";

  div.innerHTML = `
    <h4>Panel ${panel}</h4>
    <p>${ubicacion}</p>
    <p style="color:${color};">${estado}</p>
  `;

  document.getElementById("historial").appendChild(div);
}

</script>

</body>
</html>
