<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, button, select {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: green;
  color: white;
  cursor: pointer;
}

.panel {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  width: 330px;
  border-radius: 10px;
}

.falla {
  border: 2px solid red;
  animation: parpadeo 0.8s infinite;
}

@keyframes parpadeo {
  0% { background: #1e293b; }
  50% { background: #7f1d1d; }
  100% { background: #1e293b; }
}

.kpi {
  display: inline-block;
  background: #1e293b;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🌱 Alerta Verde AI</h1>
<p>Monitoreo inteligente + decisiones económicas</p>

<div class="kpi">⚡ Producción total: <span id="produccion">0</span> kWh</div>
<div class="kpi">🚨 Alertas: <span id="alertas">0</span></div>

<h2>📥 Agregar panel</h2>

<input id="panel" placeholder="ID">
<input id="ubicacion" placeholder="Ubicación">
<input id="temperatura" placeholder="Temp">
<input id="voltaje" placeholder="Voltaje">
<input id="corriente" placeholder="Corriente">
<input id="eficiencia" placeholder="Eficiencia">

<select id="garantia">
  <option value="si">🛡️ Con garantía</option>
  <option value="no">❌ Sin garantía</option>
</select>

<br>
<button onclick="agregar()">➕ Agregar</button>
<button onclick="analizar()">🚀 Analizar</button>

<h2>📊 Estado de paneles</h2>
<div id="resultados"></div>

<h2>📜 Historial de fallos</h2>
<ul id="historial"></ul>

<script>

let paneles = [];

function agregar() {
  paneles.push({
    id: panel.value,
    ubicacion: ubicacion.value,
    temp: +temperatura.value,
    volt: +voltaje.value,
    corr: +corriente.value,
    eff: +eficiencia.value,
    garantia: garantia.value
  });

  alert("Panel agregado");
}

function analizar() {

  let totalProd = 0;
  let totalAlertas = 0;

  resultados.innerHTML = "";

  paneles.forEach(p => {

    let estado = "Normal";
    let tipo = "";
    let motivo = "";
    let recomendacion = "";
    let prioridad = "Baja";

    // 🔍 FALLAS
    if (p.eff < 50) {
      estado = "Falla";
      tipo = "🔻 Baja eficiencia";
      motivo = "Conversión energética baja";
      recomendacion = "Limpiar o revisar daño";
      prioridad = "Alta";
    }

    if (p.temp > 60) {
      estado = "Falla";
      tipo = "🔥 Sobrecalentamiento";
      motivo = "Temperatura elevada";
      recomendacion = "Mejorar ventilación";
      prioridad = "Media";
    }

    if (p.volt < 20) {
      estado = "Falla";
      tipo = "⚡ Caída de producción";
      motivo = "Voltaje bajo";
      recomendacion = "Revisar conexión";
      prioridad = "Alta";
    }

    if (p.volt == 0) {
      estado = "Falla";
      tipo = "🧱 Panel desconectado";
      motivo = "Sin generación";
      recomendacion = "Reconectar panel";
      prioridad = "Alta";
    }

    if (p.eff < 60 && p.temp < 50) {
      tipo = "🌫️ Suciedad o sombreado";
      motivo = "Bloqueo de luz";
      recomendacion = "Limpieza del panel";
    }

    // ⚡ PRODUCCIÓN
    let energia = estado === "Falla" ? (Math.random()*15+5) : (Math.random()*5+10);
    totalProd += energia;

    let costo = energia * 0.15;
    let reparacion = estado === "Falla" ? (Math.random()*200+50) : 0;

    // 🛡️ GARANTÍA (AJUSTE INTELIGENTE)
    let mensajeGarantia = "";
    if (p.garantia === "si" && estado === "Falla") {
      reparacion = 0;
      mensajeGarantia = "🛡️ Cubierto por garantía";
      recomendacion = "Contactar proveedor (sin costo)";
    } else if (estado === "Falla") {
      mensajeGarantia = "❌ Fuera de garantía";
    }

    let fecha = new Date().toLocaleString();

    if (estado === "Falla") {
      totalAlertas++;

      let li = document.createElement("li");
      li.innerText = `${tipo} en panel ${p.id}`;
      historial.appendChild(li);
    }

    let div = document.createElement("div");
    div.className = estado === "Falla" ? "panel falla" : "panel";

    div.innerHTML = `
      <h3>Panel ${p.id}</h3>
      <p>📍 ${p.ubicacion}</p>
      <p>🕒 ${fecha}</p>
      <p>${estado}</p>
      <p>${tipo}</p>

      ${estado === "Falla" ? `
        <p>⚠️ Prioridad: ${prioridad}</p>
        <p>❓ ${motivo}</p>
        <p>💡 ${recomendacion}</p>
        <p>${mensajeGarantia}</p>
      ` : ""}

      <p>⚡ Producción: ${energia.toFixed(2)} kWh</p>
      <p>💸 Pérdida: $${costo.toFixed(2)}</p>
      <p>🔧 Reparación: $${reparacion.toFixed(2)}</p>
    `;

    resultados.appendChild(div);
  });

  produccion.innerText = totalProd.toFixed(2);
  alertas.innerText = totalAlertas;
}

</script>

</body>
</html>
