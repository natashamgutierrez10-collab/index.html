<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input, button { margin:5px; padding:8px; border-radius:5px; border:none; }
button { background:green; color:white; }

.card { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }

.falla { border:2px solid red; animation: blink 1s infinite; }

@keyframes blink {
  50% { background:#7f1d1d; }
}

#semaforo div {
  width:40px; height:40px; border-radius:50%;
  display:inline-block; margin:5px;
}
</style>
</head>

<body>

<h2>🌱 Alerta Verde AI</h2>

<!-- LOGIN -->
<div id="login">
  <input id="user" placeholder="Usuario">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- SEMÁFORO -->
<div id="semaforo">
  <div id="verde" style="background:green;"></div>
  <div id="amarillo" style="background:gray;"></div>
  <div id="rojo" style="background:gray;"></div>
</div>

<br>

<input id="id" placeholder="ID">
<input id="ubi" placeholder="Ubicación">
<input id="temp" placeholder="Temp">
<input id="volt" placeholder="Voltaje">
<input id="eff" placeholder="Eficiencia">
<input type="date" id="instalacion">

<br>

<button onclick="add()">Agregar</button>
<button onclick="run()">Analizar</button>

<div id="grid"></div>

</div>

<script>

let data = [];
let usuario = "";

// LOGIN
function login(){
  usuario = document.getElementById("user").value;

  if(usuario===""){
    alert("Escribe un usuario");
    return;
  }

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  cargar();
}

// GUARDAR
function guardar(){
  localStorage.setItem(usuario, JSON.stringify(data));
}

// CARGAR
function cargar(){
  let d = localStorage.getItem(usuario);
  if(d){ data = JSON.parse(d); }
}

// AGREGAR
function add(){

  let panel = {
    id: document.getElementById("id").value,
    u: document.getElementById("ubi").value,
    t: Number(document.getElementById("temp").value),
    v: Number(document.getElementById("volt").value),
    e: Number(document.getElementById("eff").value),
    f: new Date(document.getElementById("instalacion").value)
  };

  data.push(panel);
  guardar();

  alert("Panel agregado");
}

// ANALIZAR
function run(){

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  let estadoGlobal = "verde";

  data.forEach(p => {

    let estado = "Normal";

    if(p.e < 50 || p.v < 20 || p.t > 60){
      estado = "Falla";
      estadoGlobal = "rojo";
    } else if(p.e < 60){
      estadoGlobal = "amarillo";
    }

    let card = document.createElement("div");
    card.className = estado==="Falla" ? "card falla" : "card";

    card.innerHTML = `
      <h3>${p.id}</h3>
      <p>${p.u}</p>
      <p>${estado}</p>
      <p>Temp: ${p.t}</p>
      <p>Volt: ${p.v}</p>
      <p>Eficiencia: ${p.e}</p>
    `;

    grid.appendChild(card);

  });

  // SEMÁFORO
  document.getElementById("verde").style.background="gray";
  document.getElementById("amarillo").style.background="gray";
  document.getElementById("rojo").style.background="gray";

  if(estadoGlobal==="verde") document.getElementById("verde").style.background="green";
  if(estadoGlobal==="amarillo") document.getElementById("amarillo").style.background="yellow";
  if(estadoGlobal==="rojo") document.getElementById("rojo").style.background="red";

}

</script>

</body>
</html>
