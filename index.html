<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* LOGIN */
#login {
  text-align: center;
  margin-top: 100px;
}

/* HEADER */
.header {
  background: #020617;
  padding: 20px;
  text-align: center;
}

/* SEMÁFORO */
#semaforo div {
  width:50px;
  height:50px;
  border-radius:50%;
  display:inline-block;
  margin:5px;
}

/* KPIs */
.kpis {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 20px;
}

.kpi {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

/* FORM */
.form {
  text-align: center;
}

input, button {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: green;
  color: white;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* CARDS */
.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  width: 320px;
  border-radius: 10px;
}

.falla {
  border: 2px solid red;
  animation: parpadeo 0.8s infinite;
}

@keyframes parpadeo {
  0% { background: #1e293b; }
  50% { background: #7f1d1d; }
  100% { background: #1e293b; }
}

.alta { color: red; }
.media { color: orange; }
.baja { color: lightgreen; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🌱 Alerta Verde AI</h2>
  <input id="user" placeholder="Usuario">
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="header">
  <h1>Dashboard</h1>
</div>

<!-- SEMÁFORO -->
<div id="semaforo" style="text-align:center;">
  <div id="verde" style="background:green;"></div>
  <div id="amarillo" style="background:gray;"></div>
  <div id="rojo" style="background:gray;"></div>
</div>

<!-- KPIs -->
<div class="kpis">
  <div class="kpi">⚡ Producción: <span id="prod">0</span></div>
  <div class="kpi">🚨 Alertas: <span id="alert">0</span></div>
</div>

<!-- FORM -->
<div class="form">
  <input id="id" placeholder="ID">
  <input id="ubi" placeholder="Ubicación">
  <input id="temp" placeholder="Temp">
  <input id="volt" placeholder="Voltaje">
  <input id="corr" placeholder="Corriente">
  <input id="eff" placeholder="Eficiencia">

  <br>
  📅 Instalación:
  <input type="date" id="instalacion">

  <br>
  <button onclick="add()">➕ Agregar</button>
  <button onclick="run()">🚀 Analizar</button>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

let data = [];
let usuario = "";

// LOGIN
function login(){
  usuario = document.getElementById("user").value;
  localStorage.setItem("usuario", usuario);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  cargarDatos();
}

// GUARDAR
function guardar(){
  localStorage.setItem(usuario, JSON.stringify(data));
}

// CARGAR
function cargarDatos(){
  let datos = localStorage.getItem(usuario);
  if(datos){
    data = JSON.parse(datos);
  }
}

// CORREO WEB3FORMS
function enviarCorreo(panel, tipo, ubicacion, motivo, prioridad){

  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      access_key: "76312543-91d1-4848-b666-04739727e77f",
      subject: "🚨 Alerta Panel Solar",
      message:
        "Panel: " + panel +
        "\nUbicación: " + ubicacion +
        "\nTipo: " + tipo +
        "\nMotivo: " + motivo +
        "\nPrioridad: " + prioridad
    })
  });

}

// AGREGAR
function add(){
  data.push({
    id: id.value,
    u: ubi.value,
    t: +temp.value,
    v: +volt.value,
    c: +corr.value,
    e: +eff.value,
    f: new Date(instalacion.value)
  });

  guardar();
  alert("Panel agregado");
}

// ANALIZAR
function run(){

  grid.innerHTML = "";

  let prod = 0;
  let alertas = 0;
  let estadoGlobal = "verde";

  let hoy = new Date();

  data.forEach(p => {

    let estado="Normal";
    let tipo="";
    let motivo="";
    let reco="";
    let prioridad="baja";

    if(p.e < 50){
      estado="Falla";
      tipo="🔻 Baja eficiencia";
      motivo="Conversión baja";
      reco="Limpiar";
      prioridad="alta";
    }

    if(p.t > 60){
      estado="Falla";
      tipo="🔥 Sobrecalentamiento";
      motivo="Alta temperatura";
      reco="Ventilar";
      prioridad="media";
    }

    if(p.v < 20){
      estado="Falla";
      tipo="⚡ Caída producción";
      motivo="Voltaje bajo";
      reco="Revisar";
      prioridad="alta";
    }

    if(p.v == 0){
      estado="Falla";
      tipo="🧱 Desconectado";
      motivo="Sin energía";
      reco="Reconectar";
      prioridad="alta";
    }

    if(estado==="Falla"){
      alertas++;
      estadoGlobal="rojo";
      enviarCorreo(p.id, tipo, p.u, motivo, prioridad);
    } else if(p.e < 60){
      estadoGlobal="amarillo";
    }

    let energia = estado==="Falla" ? Math.random()*10+5 : Math.random()*10+10;
    prod += energia;

    let costo = energia*0.15;
    let reparacion = estado==="Falla" ? Math.random()*200+50 : 0;

    let años = (hoy - p.f)/(1000*60*60*24*365);
    let garantia = años <= 5;

    let garantiaMsg = garantia ? "🛡️ Activa" : "❌ Vencida";
    if(garantia && estado==="Falla"){
      reparacion = 0;
      reco="Contactar proveedor";
    }

    let card = document.createElement("div");
    card.className = estado==="Falla" ? "card falla" : "card";

    card.innerHTML = `
      <h3>${p.id}</h3>
      <p>${p.u}</p>
      <p>${estado}</p>
      <p>${tipo}</p>
      <p>${motivo}</p>
      <p>${reco}</p>
      <p>${prioridad}</p>
      <p>${garantiaMsg}</p>
      <p>⚡ ${energia.toFixed(2)} kWh</p>
      <p>💸 $${costo.toFixed(2)}</p>
      <p>🔧 $${reparacion.toFixed(2)}</p>
    `;

    grid.appendChild(card);
  });

  // SEMÁFORO
  verde.style.background="gray";
  amarillo.style.background="gray";
  rojo.style.background="gray";

  if(estadoGlobal==="verde") verde.style.background="green";
  if(estadoGlobal==="amarillo") amarillo.style.background="yellow";
  if(estadoGlobal==="rojo") rojo.style.background="red";

  document.getElementById("prod").innerText = prod.toFixed(2);
  document.getElementById("alert").innerText = alertas;
}

// AUTO
setInterval(()=>{
  if(data.length>0) run();
},15000);

</script>

</body>
</html>
