<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alerta Verde AI</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, button {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: green;
  color: white;
  cursor: pointer;
}

.panel {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  width: 300px;
  border-radius: 10px;
}

/* 🔴 EFECTO DE ALERTA */
.falla {
  border: 2px solid red;
  animation: parpadeo 0.8s infinite;
}

@keyframes parpadeo {
  0% { background-color: #1e293b; }
  50% { background-color: #7f1d1d; }
  100% { background-color: #1e293b; }
}
</style>
</head>

<body>

<h1>🌱 Alerta Verde AI</h1>

<h2>🚨 Alertas: <span id="contador">0</span></h2>

<h2>📥 Agregar panel</h2>

<input id="panel" placeholder="ID Panel">
<input id="ubicacion" placeholder="Ubicación">
<input id="temperatura" placeholder="Temperatura">
<input id="voltaje" placeholder="Voltaje">
<input id="corriente" placeholder="Corriente">
<input id="eficiencia" placeholder="Eficiencia">

<br>
<button onclick="agregarPanel()">➕ Agregar Panel</button>
<button onclick="analizarTodo()">🚀 Analizar Todos</button>

<h2>📋 Paneles cargados</h2>
<div id="lista"></div>

<h2>🚨 Resultados</h2>
<div id="resultados"></div>

<script>

// Permiso notificaciones
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

let paneles = [];
let totalAlertas = 0;

// ➕ AGREGAR PANEL
function agregarPanel() {

  const p = {
    panel: document.getElementById("panel").value,
    ubicacion: document.getElementById("ubicacion").value,
    temp: parseFloat(document.getElementById("temperatura").value),
    volt: parseFloat(document.getElementById("voltaje").value),
    corr: parseFloat(document.getElementById("corriente").value),
    eff: parseFloat(document.getElementById("eficiencia").value)
  };

  paneles.push(p);

  const div = document.createElement("div");
  div.className = "panel";
  div.innerHTML = `Panel ${p.panel} - ${p.ubicacion}`;

  document.getElementById("lista").appendChild(div);

  // limpiar inputs
  document.getElementById("panel").value = "";
  document.getElementById("ubicacion").value = "";
  document.getElementById("temperatura").value = "";
  document.getElementById("voltaje").value = "";
  document.getElementById("corriente").value = "";
  document.getElementById("eficiencia").value = "";
}

// 🚀 ANALIZAR TODOS
function analizarTodo() {

  document.getElementById("resultados").innerHTML = "";
  totalAlertas = 0;

  paneles.forEach(p => {

    let estado = "Normal";

    if (p.eff < 50 || p.volt < 20 || p.temp > 60) {
      estado = "Falla";
    }

    let energia = estado === "Falla" ? (Math.random()*15+5) : (Math.random()*2);
    let costo = energia * 0.15;
    let reparacion = estado === "Falla" ? (Math.random()*150+50) : 0;

    // 🚨 ALERTA
    if (estado === "Falla") {

      totalAlertas++;
      
      // Notificación
      if (Notification.permission === "granted") {
        new Notification("🚨 Falla detectada", {
          body: `Panel ${p.panel} - ${p.ubicacion}`
        });
      }

      // Sonido
      new Audio("https://www.soundjay.com/buttons/beep-01a.mp3").play();
    }

    // Crear tarjeta
    const div = document.createElement("div");

    // 🔴 IMPORTANTE: solo falla parpadea
    div.className = estado === "Falla" ? "panel falla" : "panel";

    div.innerHTML = `
      <h3>Panel ${p.panel}</h3>
      <p>📍 ${p.ubicacion}</p>
      <p style="color:${estado === "Falla" ? "red" : "lightgreen"}">${estado}</p>
      <p>⚡ ${energia.toFixed(2)} kWh</p>
      <p>💸 $${costo.toFixed(2)}</p>
      <p>🔧 $${reparacion.toFixed(2)}</p>
    `;

    document.getElementById("resultados").appendChild(div);
  });

  document.getElementById("contador").innerText = totalAlertas;
}

</script>

</body>
</html>
